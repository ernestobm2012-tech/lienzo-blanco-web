<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lienzo Blanco — Panel de presupuestos</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FBF8F2;
  --paper-deep:#F2EBDC;
  --ink:#211D18;
  --ink-soft:#584F41;
  --gold:#A9834A;
  --gold-deep:#7C5E2E;
  --gold-pale:#E7DAB9;
  --serif:'Cormorant Garamond', Georgia, serif;
  --sans:'Jost', Arial, sans-serif;
  --ok:#3E7A4F;
  --warn:#B3542A;
}
*{box-sizing:border-box;}
body{margin:0; font-family:var(--sans); color:var(--ink); background:var(--paper); font-weight:300;}
h1,h2,h3{font-family:var(--serif); font-weight:500; color:var(--ink); letter-spacing:0.01em; margin:0;}
a{color:var(--gold-deep);}

.login-screen{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
.login-card{background:var(--paper-deep); border:1px solid var(--gold-pale); border-radius:6px; padding:40px 36px; width:100%; max-width:380px;}
.login-card h1{font-size:1.8rem; margin-bottom:6px;}
.login-card p{color:var(--ink-soft); font-size:0.9rem; margin:0 0 24px;}
.field{margin-bottom:16px;}
.field label{display:block; font-size:0.8rem; letter-spacing:0.04em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:6px;}
.field input{width:100%; padding:10px 12px; border:1px solid var(--gold-pale); border-radius:4px; background:var(--paper); font-family:var(--sans); font-size:0.95rem; color:var(--ink);}
.field input:focus{outline:2px solid var(--gold-deep);}
.btn{display:inline-block; border:1px solid var(--ink); background:var(--ink); color:var(--paper); padding:11px 20px; border-radius:4px; font-family:var(--sans); font-size:0.9rem; letter-spacing:0.03em; cursor:pointer; text-align:center;}
.btn:hover{background:var(--gold-deep); border-color:var(--gold-deep);}
.btn.secondary{background:transparent; color:var(--ink); border-color:var(--ink);}
.btn.secondary:hover{background:var(--ink); color:var(--paper);}
.btn.danger{background:transparent; color:var(--warn); border-color:var(--warn);}
.btn.danger:hover{background:var(--warn); color:var(--paper);}
.btn.small{padding:6px 12px; font-size:0.8rem;}
.msg{font-size:0.85rem; margin-top:14px; min-height:1.2em;}
.msg.err{color:var(--warn);}
.msg.ok{color:var(--ok);}

header.top{display:flex; align-items:center; justify-content:space-between; padding:18px 28px; border-bottom:1px solid var(--gold-pale); background:var(--paper-deep);}
header.top h1{font-size:1.4rem;}
header.top .who{font-size:0.85rem; color:var(--ink-soft);}

main{max-width:1100px; margin:0 auto; padding:28px;}
.toolbar{display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:22px;}
.toolbar select{padding:8px 10px; border:1px solid var(--gold-pale); border-radius:4px; background:var(--paper); font-family:var(--sans); color:var(--ink);}
.count{font-size:0.85rem; color:var(--ink-soft); margin-left:auto;}

.cards{display:flex; flex-direction:column; gap:14px;}
.card{background:var(--paper-deep); border:1px solid var(--gold-pale); border-radius:6px; padding:20px 22px;}
.card-top{display:flex; flex-wrap:wrap; justify-content:space-between; gap:10px; margin-bottom:10px;}
.card-name{font-size:1.25rem;}
.card-date{font-size:0.8rem; color:var(--ink-soft);}
.badge{display:inline-block; font-size:0.72rem; letter-spacing:0.04em; text-transform:uppercase; padding:3px 10px; border-radius:20px; border:1px solid var(--gold-pale);}
.badge.pendiente{color:var(--warn); border-color:var(--warn);}
.badge.contactado{color:var(--ok); border-color:var(--ok);}
.badge.descartado{color:var(--ink-soft); border-color:var(--ink-soft); text-decoration:line-through;}
.card-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:8px 20px; font-size:0.9rem; margin-bottom:12px;}
.card-grid div span{display:block; font-size:0.72rem; text-transform:uppercase; letter-spacing:0.04em; color:var(--ink-soft);}
.card-message{background:var(--paper); border:1px solid var(--gold-pale); border-radius:4px; padding:10px 12px; font-size:0.9rem; color:var(--ink-soft); margin-bottom:14px; white-space:pre-wrap;}
.card-actions{display:flex; flex-wrap:wrap; gap:8px;}
.empty{text-align:center; padding:60px 20px; color:var(--ink-soft);}
.loading{text-align:center; padding:60px 20px; color:var(--ink-soft);}

.tabs{display:flex; gap:8px; margin-bottom:22px; border-bottom:1px solid var(--gold-pale);}
.tab-btn{background:none; border:none; font-family:var(--sans); font-size:0.95rem; color:var(--ink-soft); padding:10px 4px; cursor:pointer; border-bottom:2px solid transparent; margin-right:18px;}
.tab-btn.active{color:var(--ink); border-bottom-color:var(--gold-deep);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

.form-card{background:var(--paper-deep); border:1px solid var(--gold-pale); border-radius:6px; padding:22px 24px; margin-bottom:24px;}
.form-card h2{font-size:1.2rem; margin-bottom:16px;}
.form-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px;}
.form-grid .field{margin-bottom:0;}
.form-grid textarea{width:100%; padding:10px 12px; border:1px solid var(--gold-pale); border-radius:4px; background:var(--paper); font-family:var(--sans); font-size:0.95rem; color:var(--ink); resize:vertical; min-height:60px;}
.form-grid select{width:100%; padding:10px 12px; border:1px solid var(--gold-pale); border-radius:4px; background:var(--paper); font-family:var(--sans); font-size:0.95rem; color:var(--ink);}
.field-checkbox{display:flex; align-items:center; gap:8px; margin-top:26px;}
.form-actions{display:flex; gap:10px; margin-top:18px; align-items:center;}

.prov-card{background:var(--paper-deep); border:1px solid var(--gold-pale); border-radius:6px; padding:18px 20px;}
.prov-card.inactive{opacity:0.55;}
.prov-top{display:flex; flex-wrap:wrap; justify-content:space-between; gap:10px; margin-bottom:6px;}
.prov-name{font-size:1.15rem;}
.prov-cat{font-size:0.72rem; letter-spacing:0.04em; text-transform:uppercase; color:var(--gold-deep);}

.gallery-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px;}
.gallery-item{background:var(--paper-deep); border:1px solid var(--gold-pale); border-radius:6px; overflow:hidden;}
.gallery-item img{width:100%; height:150px; object-fit:cover; display:block; background:var(--paper);}
.gallery-item-body{padding:10px 12px;}
.gallery-item-section{font-size:0.7rem; letter-spacing:0.04em; text-transform:uppercase; color:var(--gold-deep); margin-bottom:4px;}
.gallery-item-caption{font-size:0.85rem; color:var(--ink-soft); margin-bottom:8px; min-height:1.2em;}
.file-input{width:100%; padding:9px 10px; border:1px solid var(--gold-pale); border-radius:4px; background:var(--paper); font-family:var(--sans); font-size:0.9rem;}
</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <h1>Lienzo Blanco</h1>
    <p>Panel de presupuestos — acceso privado.</p>
    <form id="loginForm">
      <div class="field">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="loginPassword">Contraseña</label>
        <input type="password" id="loginPassword" autocomplete="current-password" required>
      </div>
      <div class="field-checkbox" style="margin-top:0; margin-bottom:18px;">
        <input type="checkbox" id="rememberMe" checked>
        <label for="rememberMe" style="margin:0; text-transform:none; font-size:0.9rem;">Recordar sesión en este dispositivo</label>
      </div>
      <button type="submit" class="btn" style="width:100%;">Entrar</button>
      <p class="msg" id="loginMsg"></p>
    </form>
  </div>
</div>

<div id="appScreen" style="display:none;">
  <header class="top">
    <h1>Panel — Lienzo Blanco</h1>
    <div style="display:flex; align-items:center; gap:16px;">
      <span class="who" id="whoami"></span>
      <button class="btn secondary small" id="logoutBtn">Salir</button>
    </div>
  </header>
  <main>
    <div class="tabs">
      <button class="tab-btn active" data-tab="quotes">Presupuestos</button>
      <button class="tab-btn" data-tab="providers">Proveedores</button>
      <button class="tab-btn" data-tab="gallery">Galería</button>
    </div>

    <div class="tab-panel active" id="tab-quotes">
      <div class="toolbar">
        <select id="statusFilter">
          <option value="todos">Todos los estados</option>
          <option value="pendiente">Pendiente</option>
          <option value="contactado">Contactado</option>
          <option value="descartado">Descartado</option>
        </select>
        <span class="count" id="countLabel"></span>
      </div>
      <div id="listArea" class="cards">
        <div class="loading">Cargando presupuestos…</div>
      </div>
    </div>

    <div class="tab-panel" id="tab-providers">
      <div class="form-card">
        <h2 id="provFormTitle">Añadir proveedor</h2>
        <form id="providerForm">
          <input type="hidden" id="prov-id">
          <div class="form-grid">
            <div class="field">
              <label for="prov-name">Nombre / razón social</label>
              <input type="text" id="prov-name" required>
            </div>
            <div class="field">
              <label for="prov-cif">CIF / NIF</label>
              <input type="text" id="prov-cif">
            </div>
            <div class="field">
              <label for="prov-category">A qué se dedica</label>
              <select id="prov-category" required>
                <option value="">Selecciona una categoría…</option>
                <option>Fincas y localizaciones</option>
                <option>Catering y banquetes</option>
                <option>Fotografía y vídeo</option>
                <option>Música y espectáculos</option>
                <option>Floristería y decoración</option>
                <option>Papelería e invitaciones</option>
                <option>Transporte y coches</option>
                <option>Estilismo y belleza</option>
                <option>Otros</option>
              </select>
            </div>
            <div class="field">
              <label for="prov-address">Dirección</label>
              <input type="text" id="prov-address">
            </div>
            <div class="field">
              <label for="prov-contact">Persona de contacto</label>
              <input type="text" id="prov-contact">
            </div>
            <div class="field">
              <label for="prov-phone">Teléfono</label>
              <input type="text" id="prov-phone">
            </div>
            <div class="field">
              <label for="prov-email">Email</label>
              <input type="email" id="prov-email">
            </div>
            <div class="field">
              <label for="prov-website">Web / Instagram</label>
              <input type="text" id="prov-website" placeholder="https://…">
            </div>
            <div class="field" style="grid-column:1/-1;">
              <label for="prov-notes">Notas (tarifas, condiciones, experiencia con ellos…)</label>
              <textarea id="prov-notes"></textarea>
            </div>
            <div class="field-checkbox">
              <input type="checkbox" id="prov-active" checked>
              <label for="prov-active" style="margin:0; text-transform:none; font-size:0.9rem;">Proveedor activo</label>
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn" id="provSubmitBtn">Guardar proveedor</button>
            <button type="button" class="btn secondary" id="provCancelBtn" style="display:none;">Cancelar edición</button>
            <p class="msg" id="provFormMsg" style="margin:0;"></p>
          </div>
        </form>
      </div>

      <div class="toolbar">
        <select id="providerCategoryFilter">
          <option value="todos">Todas las categorías</option>
          <option>Fincas y localizaciones</option>
          <option>Catering y banquetes</option>
          <option>Fotografía y vídeo</option>
          <option>Música y espectáculos</option>
          <option>Floristería y decoración</option>
          <option>Papelería e invitaciones</option>
          <option>Transporte y coches</option>
          <option>Estilismo y belleza</option>
          <option>Otros</option>
        </select>
        <span class="count" id="providerCountLabel"></span>
      </div>
      <div id="providerListArea" class="cards">
        <div class="loading">Cargando proveedores…</div>
      </div>
    </div>

    <div class="tab-panel" id="tab-gallery">
      <div class="form-card">
        <h2>Añadir imagen</h2>
        <form id="galleryForm">
          <div class="form-grid">
            <div class="field">
              <label for="gal-section">Sección de la web</label>
              <select id="gal-section" required>
                <option value="home">Portada</option>
                <option value="sobre">Sobre mí</option>
                <option value="proceso">Cómo trabajamos</option>
                <option value="servicios">Bodas</option>
                <option value="empresas">Empresas e instituciones</option>
                <option value="colaboradores">Colaboradores</option>
                <option value="contacto">Contacto</option>
              </select>
            </div>
            <div class="field">
              <label for="gal-file">Imagen</label>
              <input type="file" id="gal-file" class="file-input" accept="image/*" required>
            </div>
            <div class="field" style="grid-column:1/-1;">
              <label for="gal-caption">Descripción (opcional)</label>
              <input type="text" id="gal-caption" placeholder="Se muestra debajo de la foto en la web">
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn" id="galSubmitBtn">Subir imagen</button>
            <p class="msg" id="galFormMsg" style="margin:0;"></p>
          </div>
        </form>
      </div>

      <div class="toolbar">
        <select id="gallerySectionFilter">
          <option value="todos">Todas las secciones</option>
          <option value="home">Portada</option>
          <option value="sobre">Sobre mí</option>
          <option value="proceso">Cómo trabajamos</option>
          <option value="servicios">Bodas</option>
          <option value="empresas">Empresas e instituciones</option>
          <option value="colaboradores">Colaboradores</option>
          <option value="contacto">Contacto</option>
        </select>
        <span class="count" id="galleryCountLabel"></span>
      </div>
      <div id="galleryListArea" class="gallery-grid">
        <div class="loading">Cargando imágenes…</div>
      </div>
    </div>
  </main>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://ztsdkfwnqrlmsirfvoat.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_bt-0G1I3KXlFfwskeMvJsQ_QS3_L-Dc';

// "Recordar sesión": si está marcado, la sesión se guarda en localStorage
// (sobrevive a cerrar el navegador); si no, en sessionStorage (se olvida
// al cerrar la pestaña/navegador).
const REMEMBER_KEY = 'lb_admin_remember';
const rememberStorage = {
  getItem: (key) => localStorage.getItem(key) ?? sessionStorage.getItem(key),
  setItem: (key, value) => {
    if (localStorage.getItem(REMEMBER_KEY) === '0') {
      sessionStorage.setItem(key, value);
      localStorage.removeItem(key);
    } else {
      localStorage.setItem(key, value);
      sessionStorage.removeItem(key);
    }
  },
  removeItem: (key) => { localStorage.removeItem(key); sessionStorage.removeItem(key); },
};

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { storage: rememberStorage, persistSession: true, autoRefreshToken: true },
});

const loginScreen = document.getElementById('loginScreen');
const appScreen = document.getElementById('appScreen');
const loginForm = document.getElementById('loginForm');
const loginMsg = document.getElementById('loginMsg');
const whoami = document.getElementById('whoami');
const listArea = document.getElementById('listArea');
const statusFilter = document.getElementById('statusFilter');
const countLabel = document.getElementById('countLabel');

let allQuotes = [];

function waNumber(phone){
  let digits = (phone || '').replace(/\D/g, '');
  if (digits.startsWith('0034')) digits = digits.slice(2);
  if (digits.length === 9) digits = '34' + digits;
  return digits;
}

function fmtDate(iso){
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString('es-ES', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

function escapeHtml(s){
  return (s ?? '').toString()
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderQuotes(){
  const filter = statusFilter.value;
  const rows = filter === 'todos' ? allQuotes : allQuotes.filter(q => q.status === filter);
  countLabel.textContent = `${rows.length} presupuesto${rows.length === 1 ? '' : 's'}`;

  if (!rows.length){
    listArea.innerHTML = '<div class="empty">No hay presupuestos que mostrar.</div>';
    return;
  }

  listArea.innerHTML = rows.map(q => {
    const waText = `Hola ${q.name}, soy Beatriz de Lienzo Blanco. Gracias por tu solicitud de presupuesto` + (q.event_type ? ` para tu ${q.event_type.toLowerCase()}` : '') + '. ¿Hablamos?';
    const waHref = q.phone ? `https://wa.me/${waNumber(q.phone)}?text=${encodeURIComponent(waText)}` : null;
    return `
    <div class="card" data-id="${q.id}">
      <div class="card-top">
        <span class="card-name">${escapeHtml(q.name)}</span>
        <span class="badge ${q.status}">${q.status}</span>
      </div>
      <div class="card-date">${fmtDate(q.created_at)}</div>
      <div class="card-grid" style="margin-top:10px;">
        <div><span>Email</span><a href="mailto:${escapeHtml(q.email)}">${escapeHtml(q.email)}</a></div>
        <div><span>Teléfono</span>${q.phone ? escapeHtml(q.phone) : '—'}</div>
        <div><span>Tipo de evento</span>${q.event_type ? escapeHtml(q.event_type) : '—'}</div>
        <div><span>Fecha del evento</span>${q.event_date ? escapeHtml(q.event_date) : '—'}</div>
      </div>
      ${q.message ? `<div class="card-message">${escapeHtml(q.message)}</div>` : ''}
      <div class="card-actions">
        ${waHref ? `<a class="btn small" href="${waHref}" target="_blank" rel="noopener">WhatsApp</a>` : ''}
        <a class="btn secondary small" href="mailto:${escapeHtml(q.email)}">Email</a>
        ${q.status !== 'contactado' ? `<button class="btn secondary small" data-action="status" data-status="contactado">Marcar contactado</button>` : ''}
        ${q.status !== 'pendiente' ? `<button class="btn secondary small" data-action="status" data-status="pendiente">Marcar pendiente</button>` : ''}
        ${q.status !== 'descartado' ? `<button class="btn secondary small" data-action="status" data-status="descartado">Descartar</button>` : ''}
        <button class="btn danger small" data-action="delete">Eliminar</button>
      </div>
    </div>`;
  }).join('');
}

async function loadQuotes(){
  listArea.innerHTML = '<div class="loading">Cargando presupuestos…</div>';
  const { data, error } = await supabase
    .from('presupuestos_lienzo_blanco')
    .select('*')
    .order('created_at', { ascending: false });
  if (error){
    listArea.innerHTML = `<div class="empty">Error al cargar: ${escapeHtml(error.message)}</div>`;
    return;
  }
  allQuotes = data || [];
  renderQuotes();
}

listArea.addEventListener('click', async (e) => {
  const btn = e.target.closest('button[data-action]');
  if (!btn) return;
  const card = e.target.closest('.card');
  const id = card.dataset.id;
  const action = btn.dataset.action;

  if (action === 'status'){
    const status = btn.dataset.status;
    btn.disabled = true;
    const { error } = await supabase.from('presupuestos_lienzo_blanco').update({ status }).eq('id', id);
    if (error){ alert('No se pudo actualizar: ' + error.message); btn.disabled = false; return; }
    await loadQuotes();
  }

  if (action === 'delete'){
    if (!confirm('¿Eliminar este presupuesto? No se puede deshacer.')) return;
    btn.disabled = true;
    const { error } = await supabase.from('presupuestos_lienzo_blanco').delete().eq('id', id);
    if (error){ alert('No se pudo eliminar: ' + error.message); btn.disabled = false; return; }
    await loadQuotes();
  }
});

statusFilter.addEventListener('change', renderQuotes);

// ---- Tabs ----
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
    if (btn.dataset.tab === 'providers' && !providersLoaded) loadProviders();
    if (btn.dataset.tab === 'gallery' && !galleryLoaded) loadGalleryImages();
  });
});

// ---- Proveedores ----
const providerForm = document.getElementById('providerForm');
const providerListArea = document.getElementById('providerListArea');
const providerCategoryFilter = document.getElementById('providerCategoryFilter');
const providerCountLabel = document.getElementById('providerCountLabel');
const provFormMsg = document.getElementById('provFormMsg');
const provFormTitle = document.getElementById('provFormTitle');
const provSubmitBtn = document.getElementById('provSubmitBtn');
const provCancelBtn = document.getElementById('provCancelBtn');

let allProviders = [];
let providersLoaded = false;

async function loadProviders(){
  providerListArea.innerHTML = '<div class="loading">Cargando proveedores…</div>';
  const { data, error } = await supabase
    .from('proveedores_lienzo_blanco')
    .select('*')
    .order('name', { ascending: true });
  providersLoaded = true;
  if (error){
    providerListArea.innerHTML = `<div class="empty">Error al cargar: ${escapeHtml(error.message)}</div>`;
    return;
  }
  allProviders = data || [];
  renderProviders();
}

function renderProviders(){
  const filter = providerCategoryFilter.value;
  const rows = filter === 'todos' ? allProviders : allProviders.filter(p => p.category === filter);
  providerCountLabel.textContent = `${rows.length} proveedor${rows.length === 1 ? '' : 'es'}`;

  if (!rows.length){
    providerListArea.innerHTML = '<div class="empty">No hay proveedores que mostrar.</div>';
    return;
  }

  providerListArea.innerHTML = rows.map(p => `
    <div class="prov-card ${p.active ? '' : 'inactive'}" data-id="${p.id}">
      <div class="prov-top">
        <div>
          <div class="prov-name">${escapeHtml(p.name)}${p.active ? '' : ' (inactivo)'}</div>
          <div class="prov-cat">${escapeHtml(p.category)}</div>
        </div>
      </div>
      <div class="card-grid" style="margin-top:8px;">
        <div><span>CIF / NIF</span>${p.cif_nif ? escapeHtml(p.cif_nif) : '—'}</div>
        <div><span>Dirección</span>${p.address ? escapeHtml(p.address) : '—'}</div>
        <div><span>Contacto</span>${p.contact_person ? escapeHtml(p.contact_person) : '—'}</div>
        <div><span>Teléfono</span>${p.phone ? escapeHtml(p.phone) : '—'}</div>
        <div><span>Email</span>${p.email ? `<a href="mailto:${escapeHtml(p.email)}">${escapeHtml(p.email)}</a>` : '—'}</div>
        <div><span>Web</span>${p.website ? `<a href="${escapeHtml(p.website)}" target="_blank" rel="noopener">${escapeHtml(p.website)}</a>` : '—'}</div>
      </div>
      ${p.notes ? `<div class="card-message">${escapeHtml(p.notes)}</div>` : ''}
      <div class="card-actions">
        <button class="btn secondary small" data-action="edit">Editar</button>
        <button class="btn danger small" data-action="delete">Eliminar</button>
      </div>
    </div>`).join('');
}

function fillProviderForm(p){
  document.getElementById('prov-id').value = p.id;
  document.getElementById('prov-name').value = p.name || '';
  document.getElementById('prov-cif').value = p.cif_nif || '';
  document.getElementById('prov-category').value = p.category || '';
  document.getElementById('prov-address').value = p.address || '';
  document.getElementById('prov-contact').value = p.contact_person || '';
  document.getElementById('prov-phone').value = p.phone || '';
  document.getElementById('prov-email').value = p.email || '';
  document.getElementById('prov-website').value = p.website || '';
  document.getElementById('prov-notes').value = p.notes || '';
  document.getElementById('prov-active').checked = !!p.active;
  provFormTitle.textContent = `Editar proveedor — ${p.name}`;
  provSubmitBtn.textContent = 'Guardar cambios';
  provCancelBtn.style.display = 'inline-block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetProviderForm(){
  providerForm.reset();
  document.getElementById('prov-id').value = '';
  document.getElementById('prov-active').checked = true;
  provFormTitle.textContent = 'Añadir proveedor';
  provSubmitBtn.textContent = 'Guardar proveedor';
  provCancelBtn.style.display = 'none';
}

provCancelBtn.addEventListener('click', resetProviderForm);

providerForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  provFormMsg.textContent = '';
  provFormMsg.className = 'msg';

  const id = document.getElementById('prov-id').value;
  const payload = {
    name: document.getElementById('prov-name').value.trim(),
    cif_nif: document.getElementById('prov-cif').value.trim() || null,
    category: document.getElementById('prov-category').value,
    address: document.getElementById('prov-address').value.trim() || null,
    contact_person: document.getElementById('prov-contact').value.trim() || null,
    phone: document.getElementById('prov-phone').value.trim() || null,
    email: document.getElementById('prov-email').value.trim() || null,
    website: document.getElementById('prov-website').value.trim() || null,
    notes: document.getElementById('prov-notes').value.trim() || null,
    active: document.getElementById('prov-active').checked,
  };

  provSubmitBtn.disabled = true;
  const { error } = id
    ? await supabase.from('proveedores_lienzo_blanco').update(payload).eq('id', id)
    : await supabase.from('proveedores_lienzo_blanco').insert([payload]);
  provSubmitBtn.disabled = false;

  if (error){
    provFormMsg.textContent = 'No se pudo guardar: ' + error.message;
    provFormMsg.className = 'msg err';
    return;
  }
  provFormMsg.textContent = 'Guardado correctamente.';
  provFormMsg.className = 'msg ok';
  resetProviderForm();
  await loadProviders();
});

providerListArea.addEventListener('click', async (e) => {
  const btn = e.target.closest('button[data-action]');
  if (!btn) return;
  const card = e.target.closest('.prov-card');
  const id = card.dataset.id;
  const action = btn.dataset.action;

  if (action === 'edit'){
    const p = allProviders.find(x => x.id === id);
    if (p) fillProviderForm(p);
  }

  if (action === 'delete'){
    if (!confirm('¿Eliminar este proveedor? No se puede deshacer.')) return;
    btn.disabled = true;
    const { error } = await supabase.from('proveedores_lienzo_blanco').delete().eq('id', id);
    if (error){ alert('No se pudo eliminar: ' + error.message); btn.disabled = false; return; }
    await loadProviders();
  }
});

providerCategoryFilter.addEventListener('change', renderProviders);

// ---- Galería ----
const SECTION_LABELS = {
  home: 'Portada',
  sobre: 'Sobre mí',
  proceso: 'Cómo trabajamos',
  servicios: 'Bodas',
  empresas: 'Empresas e instituciones',
  colaboradores: 'Colaboradores',
  contacto: 'Contacto',
};
const GALLERY_BUCKET = 'galeria-lienzo-blanco';

const galleryForm = document.getElementById('galleryForm');
const galFormMsg = document.getElementById('galFormMsg');
const galSubmitBtn = document.getElementById('galSubmitBtn');
const galleryListArea = document.getElementById('galleryListArea');
const gallerySectionFilter = document.getElementById('gallerySectionFilter');
const galleryCountLabel = document.getElementById('galleryCountLabel');

let allGalleryImages = [];
let galleryLoaded = false;

function galleryPublicUrl(path){
  return supabase.storage.from(GALLERY_BUCKET).getPublicUrl(path).data.publicUrl;
}

async function loadGalleryImages(){
  galleryListArea.innerHTML = '<div class="loading">Cargando imágenes…</div>';
  const { data, error } = await supabase
    .from('gallery_images_lienzo_blanco')
    .select('*')
    .order('created_at', { ascending: false });
  galleryLoaded = true;
  if (error){
    galleryListArea.innerHTML = `<div class="empty">Error al cargar: ${escapeHtml(error.message)}</div>`;
    return;
  }
  allGalleryImages = data || [];
  renderGalleryImages();
}

function renderGalleryImages(){
  const filter = gallerySectionFilter.value;
  const rows = filter === 'todos' ? allGalleryImages : allGalleryImages.filter(g => g.section === filter);
  galleryCountLabel.textContent = `${rows.length} imagen${rows.length === 1 ? '' : 'es'}`;

  if (!rows.length){
    galleryListArea.innerHTML = '<div class="empty">No hay imágenes que mostrar.</div>';
    return;
  }

  galleryListArea.innerHTML = rows.map(g => `
    <div class="gallery-item" data-id="${g.id}" data-path="${escapeHtml(g.image_path)}">
      <img src="${galleryPublicUrl(g.image_path)}" alt="${escapeHtml(g.caption || '')}" loading="lazy">
      <div class="gallery-item-body">
        <div class="gallery-item-section">${escapeHtml(SECTION_LABELS[g.section] || g.section)}</div>
        <div class="gallery-item-caption">${g.caption ? escapeHtml(g.caption) : ''}</div>
        <button class="btn danger small" data-action="delete">Eliminar</button>
      </div>
    </div>`).join('');
}

galleryForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  galFormMsg.textContent = '';
  galFormMsg.className = 'msg';

  const section = document.getElementById('gal-section').value;
  const fileInput = document.getElementById('gal-file');
  const file = fileInput.files[0];
  const caption = document.getElementById('gal-caption').value.trim() || null;

  if (!file){
    galFormMsg.textContent = 'Selecciona una imagen.';
    galFormMsg.className = 'msg err';
    return;
  }

  galSubmitBtn.disabled = true;
  galFormMsg.textContent = 'Subiendo…';

  const safeName = file.name.replace(/[^a-zA-Z0-9.\-_]/g, '_');
  const path = `${section}/${Date.now()}-${safeName}`;

  const { error: uploadError } = await supabase.storage.from(GALLERY_BUCKET).upload(path, file);
  if (uploadError){
    galFormMsg.textContent = 'No se pudo subir la imagen: ' + uploadError.message;
    galFormMsg.className = 'msg err';
    galSubmitBtn.disabled = false;
    return;
  }

  const { error: insertError } = await supabase
    .from('gallery_images_lienzo_blanco')
    .insert([{ section, image_path: path, caption }]);

  galSubmitBtn.disabled = false;

  if (insertError){
    galFormMsg.textContent = 'Imagen subida, pero no se pudo guardar en la base de datos: ' + insertError.message;
    galFormMsg.className = 'msg err';
    return;
  }

  galFormMsg.textContent = 'Imagen añadida correctamente.';
  galFormMsg.className = 'msg ok';
  galleryForm.reset();
  await loadGalleryImages();
});

galleryListArea.addEventListener('click', async (e) => {
  const btn = e.target.closest('button[data-action="delete"]');
  if (!btn) return;
  const item = e.target.closest('.gallery-item');
  const id = item.dataset.id;
  const path = item.dataset.path;

  if (!confirm('¿Eliminar esta imagen? No se puede deshacer.')) return;
  btn.disabled = true;

  await supabase.storage.from(GALLERY_BUCKET).remove([path]);
  const { error } = await supabase.from('gallery_images_lienzo_blanco').delete().eq('id', id);
  if (error){ alert('No se pudo eliminar: ' + error.message); btn.disabled = false; return; }
  await loadGalleryImages();
});

gallerySectionFilter.addEventListener('change', renderGalleryImages);

loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  loginMsg.textContent = '';
  loginMsg.className = 'msg';
  const remember = document.getElementById('rememberMe').checked;
  localStorage.setItem(REMEMBER_KEY, remember ? '1' : '0');
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const { error } = await supabase.auth.signInWithPassword({ email, password });
  if (error){
    loginMsg.textContent = 'No se pudo iniciar sesión: ' + error.message;
    loginMsg.className = 'msg err';
    return;
  }
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await supabase.auth.signOut();
});

async function showApp(session){
  loginScreen.style.display = 'none';
  appScreen.style.display = 'block';
  whoami.textContent = session.user.email;
  await loadQuotes();
}

function showLogin(){
  appScreen.style.display = 'none';
  loginScreen.style.display = 'flex';
}

(async () => {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) await showApp(session);
  else showLogin();

  supabase.auth.onAuthStateChange((_event, session) => {
    if (session) showApp(session);
    else showLogin();
  });
})();
</script>
